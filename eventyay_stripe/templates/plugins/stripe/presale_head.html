{% load static %}
{% load compress %}
{% load i18n %}

{% compress js %}
    <script type="text/javascript" src="{% static 'plugins/stripe/eventyay-stripe.js' %}"></script>
{% endcompress %}
{% compress css %}
    <link type="text/css" rel="stylesheet" href="{% static 'plugins/stripe/eventyay-stripe.css' %}">
{% endcompress %}
<script type="text/plain" id="stripe_pubkey">{{ stripe_publishable_key|default:"" }}</script>
{% if stripe_connected_account_id %}
    <script type="text/plain" id="stripe_connectedAccountId">{{ stripe_connected_account_id }}</script>
{% endif %}
    <script type="text/plain" id="stripe_merchantcountry">{{ stripe_merchant_country|default:"" }}</script>
